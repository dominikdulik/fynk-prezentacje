let currentFilter='all', currentSort='score', currentSearch='';
function filter(f,el){
  currentFilter=f;
  document.querySelectorAll('.stat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function sortBy(s,el){
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function applyFilters(){
  currentSearch=document.querySelector('.search').value.toLowerCase();
  let filtered=DATA.filter(d=>{
    if(currentFilter!=='all' && d.rc!==currentFilter) return false;
    if(currentSearch){
      const hay=(d.f+d.cat+d.stn+d.city+d.tagi+d.cnt).toLowerCase();
      if(!hay.includes(currentSearch)) return false;
    }
    return true;
  });
  if(currentSort==='score') filtered.sort((a,b)=>b.tot-a.tot);
  else if(currentSort==='firma') filtered.sort((a,b)=>a.f.localeCompare(b.f,'pl'));
  else if(currentSort==='trigger') filtered.sort((a,b)=>b.st-a.st);
  renderCards(filtered);
}
function renderCards(items){
  const grid=document.getElementById('grid');
  document.getElementById('shown-count').textContent=`Wyświetlane: ${items.length} / ${DATA.length} firm`;
  if(!items.length){grid.innerHTML='<div class="empty-state"><h3>Brak wyników</h3><p>Zmień filtry lub wyszukiwanie</p></div>';return;}
  grid.innerHTML=items.map(d=>{
    const isTop10=d.tagi&&(d.tagi.toLowerCase().includes('top 10')||d.tagi.toLowerCase().includes('top10'));
    const tagiHtml=d.tagi?d.tagi.split(',').map(t=>`<span class="tag-chip${t.trim().toLowerCase().includes('top')?' top10':''}">${t.trim()}</span>`).join(''):'';
    const wwwLink=d.www?`<a href="${d.www}" target="_blank">${d.www.replace('https://','').replace('http://','').substring(0,35)}…</a>`:'<span style="color:#4a5568">brak</span>';
    const emLink=d.em?`<a href="mailto:${d.em}">${d.em}</a>`:'<span style="color:#4a5568">brak</span>';
    return `<div class="card ${d.rc}">
      <div class="card-header">
        <div class="firma-name"><a href="${d.url}" target="_blank" title="Otwórz w LiveSpace CRM">${d.f}</a></div>
        <div class="score-badge">
          <div class="score-num">${d.tot}</div>
          <div class="score-max">/100</div>
          <div class="rec-badge">${d.rl}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="info-row"><span class="lbl">Branża</span><span class="val">${d.cat}</span></div>
        <div class="info-row"><span class="lbl">Kontakt</span><span class="val">${d.cnt||'brak danych'}</span></div>
        ${d.city?`<div class="info-row"><span class="lbl">Miasto</span><span class="val">${d.city}</span></div>`:''}
        <div class="info-row"><span class="lbl">Email</span><span class="val">${emLink}</span></div>
        <div class="info-row"><span class="lbl">WWW</span><span class="val">${wwwLink}</span></div>
        <div class="info-row"><span class="lbl">Akt. CRM</span><span class="val">${d.akt||'-'} ${d.spr&&d.spr!='0'?'· '+d.spr+' PLN':''}</span></div>
        ${tagiHtml?`<div class="info-row"><span class="lbl">Tagi</span><span class="val">${tagiHtml}</span></div>`:''}
      </div>
      <div class="score-bars">
        <div class="bar-row"><span class="bar-label">Branża</span><div class="bar-track"><div class="bar-fill branza" style="width:${d.sb/25*100}%"></div></div><span class="bar-val">${d.sb}/25</span></div>
        <div class="bar-row"><span class="bar-label">Skala</span><div class="bar-track"><div class="bar-fill skala" style="width:${d.ss/25*100}%"></div></div><span class="bar-val">${d.ss}/25</span></div>
        <div class="bar-row"><span class="bar-label">Trigger</span><div class="bar-track"><div class="bar-fill trigger" style="width:${d.st/25*100}%"></div></div><span class="bar-val">${d.st}/25</span></div>
        <div class="bar-row"><span class="bar-label">Marketing</span><div class="bar-track"><div class="bar-fill mktg" style="width:${d.sm/15*100}%"></div></div><span class="bar-val">${d.sm}/15</span></div>
        <div class="bar-row"><span class="bar-label">Decydent</span><div class="bar-track"><div class="bar-fill decyd" style="width:${d.sd/10*100}%"></div></div><span class="bar-val">${d.sd}/10</span></div>
      </div>
      <div class="entry-row"><span class="icon">→</span>${d.entry}</div>
    </div>`;
  }).join('');
}
function initCounts(){
  const counts={all:DATA.length,high:0,medium:0,low:0,nofit:0};
  DATA.forEach(d=>{counts[d.rc]=(counts[d.rc]||0)+1});
  document.getElementById('cnt-all').textContent=counts.all;
  document.getElementById('cnt-high').textContent=counts.high||0;
  document.getElementById('cnt-medium').textContent=counts.medium||0;
  document.getElementById('cnt-low').textContent=counts.low||0;
  document.getElementById('cnt-nofit').textContent=counts.nofit||0;
}
initCounts();applyFilters();
</script>
